url: https://pursuitofdatascience.github.io/countryatlas/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2166AC"

home:
  title: countryatlas • Join world data to maps on the ISO spine
  description: >
    A complete toolkit for getting country data onto honest maps, using ISO
    codes as the universal join key.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: Getting started
        href: articles/getting-started.html
      - text: Joining your own data
        href: articles/joining-your-own-data.html
      - text: Modern maps with sf & projections
        href: articles/sf-and-projections.html
      - text: Beyond the choropleth
        href: articles/beyond-the-choropleth.html
      - text: countryatlas and ggsql
        href: articles/countryatlas-and-ggsql.html
      - text: "Full introduction (formal)"
        href: articles/countryatlas.html

reference:
- title: Core data assembly
  desc: One call to a map-ready table, the light analysis table, and bare geometry.
  contents:
  - world_data
  - country_data
  - world_geometry
  - locate_country
  - country_borders
  - neighbors
  - distance_between

- title: The join engine
  desc: The package's mission, exposed for your own data.
  contents:
  - standardize_country
  - join_world
  - attach_geometry
  - country_join
  - country_join_all

- title: Diagnostics & data quality
  desc: Never lose a country silently.
  contents:
  - check_country_match
  - repair_country_names
  - country_overrides
  - audit_coverage

- title: Reference data & code translation
  contents:
  - convert_country
  - country_codes
  - country_groups
  - in_group
  - wdi_search

- title: Analysis helpers
  contents:
  - per_capita
  - aggregate_regions
  - rank_countries
  - complete_years
  - growth_rate
  - index_to
  - share_of_world

- title: Visualization
  desc: A full vocabulary of projected, area-honest maps.
  contents:
  - world_map
  - globe_map
  - spin_globe
  - facet_map
  - bubble_map
  - bivariate_map
  - cartogram_map
  - dorling_map
  - tile_map
  - flow_map
  - animate_world
  - interactive_map
  - geom_country_labels
  - theme_world_map
  - simplify_geometry

- title: Database rendering (ggsql)
  desc: Hand curated tables to ggsql for database-side spatial rendering.
  contents:
  - as_ggsql_source
  - world_query

- title: Performance & caching
  contents:
  - clear_wdi_cache

- title: Bundled datasets
  contents:
  - world_snapshot
  - country_meta
  - common_indicators
  - country_groups_tbl
  - world_tiles

- title: Package
  contents:
  - countryatlas-package
